<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Weather Frontend M2 — Home</title>

  <!-- Bootstrap CSS (CDN) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Optional: Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="bg-primary text-white">
    <nav class="navbar navbar-expand-lg container navbar-dark">
      <a class="navbar-brand" href="index.html">WeatherM2</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMain">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navMain">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link active" href="index.html" aria-current="page">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Acerca</a></li>
        </ul>
      </div>
    </nav>
  </header>

  <main class="container my-4">
    <section aria-labelledby="localidades">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 id="localidades" class="h3">Localidades destacadas</h1>
        <p class="text-muted mb-0">Haz click en una card para ver el detalle y el pronóstico semanal.</p>
      </div>
      <div id="cardsGrid" class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-3">
        <!-- Cards generadas por JS -->
      </div>
    </section>
  </main>

  <footer class="bg-light py-3 mt-4">
    <div class="container d-flex justify-content-between">
      <small>Proyecto: Weather Frontend - Módulo 2</small>
      <small>Autor: lmavalosc</small>
    </div>
  </footer>

  <!-- Data & App JS -->
  <script src="js/app.js"></script>

  <!-- Bootstrap JS (bundle includes Popper) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
